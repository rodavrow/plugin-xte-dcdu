name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Build the ESP32-S3 firmware for JC3248W535C and produce a merged binary
  # that can be flashed in a single esptool command (write_flash 0x0 ...).
  # ---------------------------------------------------------------------------
  firmware:
    name: Build firmware (JC3248W535C)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PlatformIO and esptool
        run: pip install --upgrade platformio esptool

      - name: Provide credentials.ini stub
        working-directory: firmware
        run: |
          if [ ! -f credentials.ini ]; then
            cp credentials.ini.example credentials.ini
          fi

      - name: Build firmware
        working-directory: firmware
        run: pio run -e jc3248w535

      - name: Create merged binary
        run: |
          mkdir -p dist
          esptool.py --chip esp32s3 merge_bin \
            --output dist/firmware-jc3248w535.bin \
            0x0     firmware/.pio/build/jc3248w535/bootloader.bin \
            0x8000  firmware/.pio/build/jc3248w535/partitions.bin \
            0x10000 firmware/.pio/build/jc3248w535/firmware.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/*

  # ---------------------------------------------------------------------------
  # Build the Windows X-Plane plugin (win.xpl).
  # The X-Plane SDK and xxhash are git-ignored and fetched here at build time.
  # ---------------------------------------------------------------------------
  plugin-windows:
    name: Build plugin (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download X-Plane SDK
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://developer.x-plane.com/wp-content/plugins/code-sample-generation/sdk_zip_files/XPSDK430.zip" `
            -OutFile XPSDK.zip `
            -UserAgent "Mozilla/5.0"
          Expand-Archive XPSDK.zip -DestinationPath xpsdk
          # SDK zip places files at root or under an 'SDK/' subfolder depending on version
          $root = if (Test-Path xpsdk/CHeaders) { "xpsdk" } else { "xpsdk/SDK" }
          Copy-Item -Recurse "$root/CHeaders" plugin/XPLM/CHeaders -Force
          Copy-Item -Recurse "$root/Libraries" plugin/XPLM/Libraries -Force

      - name: Download xxhash
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/Cyan4973/xxHash/dev/xxhash.h" `
            -OutFile plugin/third_party/xxhash/xxhash.h

      - name: Configure
        run: cmake -S plugin -B plugin/build -A x64

      - name: Build
        run: cmake --build plugin/build --config Release

      - name: Stage plugin artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item plugin\build\Release\win.xpl dist\win.xpl

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-windows
          path: dist/*

  # ---------------------------------------------------------------------------
  # Assemble and publish the GitHub release.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [firmware, plugin-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts and add config example
        run: |
          mkdir -p out
          find dist -type f -exec cp {} out/ \;
          cp plugin/xte-dcdu.cfg.example out/xte-dcdu.cfg.example
          ls -la out

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          draft: false
          prerelease: false
