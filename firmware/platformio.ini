[platformio]
default_envs = jc3248w535
; Optional local overrides (currently just an OTA password). Safe to delete
; the file entirely; defaults below will be used.
extra_configs = credentials.ini

; Default credentials block — overridden by credentials.ini if present.
; Wi-Fi SSID/PSK are NO LONGER baked in: the firmware runs a captive-portal
; AP on first boot (or any time it can't reach the saved network) and saves
; the credentials you enter into NVS.
[credentials]
ota_password =   ; leave blank to disable OTA auth

; ---------------------------------------------------------------------------
; Shared build settings, inherited by both environments via [env].
; ---------------------------------------------------------------------------
[env]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino

board_build.partitions      = default_8MB.csv
board_upload.flash_size     = 16MB
board_build.arduino.memory_type = qio_opi    ; PSRAM enabled

monitor_speed = 115200

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=3
    -DLISTEN_PORT=4711
    -DLINK_TIMEOUT_MS=5000
    -DOTA_PASSWORD=\"${credentials.ota_password}\"

lib_deps =
    lovyan03/LovyanGFX@^1.1.16
    bodmer/TJpg_Decoder@^1.1.0
    tzapu/WiFiManager@^2.0.17

; ---------------------------------------------------------------------------
; USB upload — first flash or recovery.
; ---------------------------------------------------------------------------
[env:esp32s3]
upload_speed = 921600

; ---------------------------------------------------------------------------
; OTA upload — device must already be running and on the same network.
; Usage:  pio run -e esp32s3_ota -t upload
; The hostname "xte-dcdu" is advertised via mDNS.  If mDNS resolution fails
; on your machine, substitute the device's IP address for upload_port.
; ---------------------------------------------------------------------------
[env:esp32s3_ota]
upload_protocol = espota
upload_port     = xte-dcdu.local
; Uncomment and set if OTA_PASSWORD is non-empty in credentials.ini:
; upload_flags    = --auth=${credentials.ota_password}

; ---------------------------------------------------------------------------
; JC3248W535(C) all-in-one board: ESP32-S3 + AXS15231B 3.5" QSPI 320x480 +
; 8 push-buttons on header P2 (no external TFT wiring required).
; ---------------------------------------------------------------------------
[env:jc3248w535]
upload_speed = 921600
build_flags  =
    ${env.build_flags}
    -DBOARD_JC3248W535
lib_deps     =
    ${env.lib_deps}
    moononournation/GFX Library for Arduino@1.4.7

[env:jc3248w535_ota]
upload_protocol = espota
upload_port     = xte-dcdu.local
build_flags  =
    ${env.build_flags}
    -DBOARD_JC3248W535
lib_deps     =
    ${env.lib_deps}
    moononournation/GFX Library for Arduino@1.4.7
; Uncomment and set if OTA_PASSWORD is non-empty in credentials.ini:
; upload_flags    = --auth=${credentials.ota_password}
